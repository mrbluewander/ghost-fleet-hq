name: Lobster Reality Engine

on:
  schedule:
    # 物理指令：讓小龍蝦在 GitHub 雲端每 60 分鐘（每小時整點）自動醒來，自主巡邏
    - cron: '0 * * * *'
  push:
    branches: [ main ]
  workflow_dispatch: # 保留您的手動強行遙控按鈕

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Execute Lobster Heartbeat
        run: |
          if [ -f heartbeat.py ]; then python heartbeat.py; fi
          if [ -f main.py ]; then python main.py; fi

      - name: Commit and Push Reality Anchor
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "actions-user"
          git add -A
          git commit -m "Lobster Engine: Reality Anchor Synced $(date)" || exit 0
          git push
